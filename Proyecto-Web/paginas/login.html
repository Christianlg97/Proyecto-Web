<!DOCTYPE html>
<html lang="es" id="htmlTag">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Sistema de Gestión de Archivos</title>
    <link rel="stylesheet" href="gestorarchivos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!--
        LOGIN.HTML - Página de Autenticación
        - Pantalla de login/registro con pestañas
        - Tras autenticar, redirige a trabajofinal.html
        - Usa login.js para lógica y trabajofinal.css para tema/estilos
    -->

    <!-- ============================================================
         BARRA DE NAVEGACIÓN Y CONTROLES
         ============================================================ -->
    <div class="controls-bar">
        <div class="dropdown-menu" id="settingsDropdown">
            <button class="control-btn dropdown-toggle" id="settingsBtn" title="Configuración"
                data-i18n-title="settings">
                <i class="fas fa-cog"></i>
            </button>
            <div class="dropdown-content" id="dropdownContent">
                <div class="dropdown-section">
                    <span class="dropdown-label" data-i18n="appearance">Apariencia</span>
                    <button class="dropdown-item" id="themeEditorBtn">
                        <i class="fas fa-palette"></i>
                        <span data-i18n="themeEditor">Temas</span>
                    </button>
                </div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-section">
                    <span class="dropdown-label" data-i18n="language">Idioma</span>
                    <button class="dropdown-item" id="languageToggle">
                        <i class="fas fa-language"></i>
                        <span>Español / English</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================
         MODALES DE LA APLICACIÓN
         ============================================================ -->

    <!-- Modal Editor de Temas -->
    <div id="themeEditorModal" class="modal">
        <div class="modal-content theme-editor-modal">
            <span class="close-modal" onclick="closeThemeEditor()">&times;</span>
            <h3><i class="fas fa-palette"></i> <span data-i18n="themeEditorTitle">Editor de Temas</span></h3>
            <div class="theme-preview-container">
                <div class="theme-preview" id="themePreview">
                    <div class="preview-header" data-i18n="preview">Vista</div>
                    <div class="preview-body">
                        <div class="preview-btn" data-i18n="save">Guardar</div>
                        <div class="preview-input" data-i18n="newNamePlaceholder">Nombre...</div>
                        <div class="preview-card" data-i18n="themeEditor">Temas</div>
                    </div>
                </div>
            </div>
            <div class="theme-colors-grid">
                <div class="color-picker-group">
                    <label data-i18n="primaryColor">Color Primario:</label>
                    <input type="color" id="primaryColorPicker" value="#4361ee">
                </div>
                <div class="color-picker-group">
                    <label data-i18n="secondaryColor">Color Secundario:</label>
                    <input type="color" id="secondaryColorPicker" value="#4cc9f0">
                </div>
                <div class="color-picker-group">
                    <label data-i18n="backgroundColor">Fondo:</label>
                    <input type="color" id="backgroundColorPicker" value="#f8fafc">
                </div>
                <div class="color-picker-group">
                    <label data-i18n="textColor">Texto:</label>
                    <input type="color" id="textColorPicker" value="#1e293b">
                </div>
                <div class="color-picker-group">
                    <label data-i18n="accentColor">Acento:</label>
                    <input type="color" id="accentColorPicker" value="#7209b7">
                </div>
                <div class="color-picker-group">
                    <label data-i18n="successColor">Éxito:</label>
                    <input type="color" id="successColorPicker" value="#06d6a0">
                </div>
                <div class="color-picker-group">
                    <label data-i18n="dangerColor">Error:</label>
                    <input type="color" id="dangerColorPicker" value="#ef476f">
                </div>
                <div class="color-picker-group">
                    <label data-i18n="warningColor">Advertencia:</label>
                    <input type="color" id="warningColorPicker" value="#ffd166">
                </div>
            </div>
            <div class="theme-presets">
                <h4 data-i18n="themePresets">Temas Predefinidos:</h4>
                <div class="preset-buttons">
                    <button class="preset-btn" onclick="applyPreset('default')" data-preset="default">Default</button>
                    <button class="preset-btn" onclick="applyPreset('ocean')" data-preset="ocean">Ocean</button>
                    <button class="preset-btn" onclick="applyPreset('forest')" data-preset="forest">Forest</button>
                    <button class="preset-btn" onclick="applyPreset('sunset')" data-preset="sunset">Sunset</button>
                    <button class="preset-btn" onclick="applyPreset('midnight')"
                        data-preset="midnight">Midnight</button>
                    <button class="preset-btn" onclick="applyPreset('dark')" data-preset="dark">Dark</button>
                    <button class="preset-btn" onclick="applyPreset('candy')" data-preset="candy">Candy</button>
                </div>
            </div>
            <div class="theme-actions">
                <button class="modal-btn cancel" onclick="resetTheme()" data-i18n="resetTheme">Restablecer</button>
                <button class="modal-btn save" onclick="saveTheme()" data-i18n="saveTheme">Guardar Tema</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
         CONTENEDOR DE LOGIN/REGISTRO
         ============================================================ -->
    <div class="container" id="loginContainer">
        <!-- Pestañas de Login/Registro -->
        <div class="tabs">
            <button class="tab-btn active" id="loginTab">
                <i class="fas fa-sign-in-alt"></i> <span data-i18n="login">Iniciar Sesión</span>
            </button>
            <button class="tab-btn" id="registerTab">
                <i class="fas fa-user-plus"></i> <span data-i18n="register">Registrarse</span>
            </button>
        </div>

        <!-- Formulario de Login -->
        <form id="loginForm" class="active-form">
            <div style="text-align: center; margin-bottom: 20px;">
                <i class="fas fa-cloud-upload-alt theme-icon-big"></i>
            </div>
            <h2><i class="fas fa-lock" style="margin-right: 10px;"></i><span data-i18n="loginTitle">Iniciar
                    Sesión</span></h2>
            <div class="form-group">
                <label for="username"><i class="fas fa-user" style="margin-right: 5px;"></i><span
                        data-i18n="username">Usuario:</span></label>
                <input type="text" id="username" placeholder="Ingresa tu usuario"
                    data-i18n-placeholder="usernamePlaceholder" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-key" style="margin-right: 5px;"></i><span
                        data-i18n="password">Contraseña:</span></label>
                <input type="password" id="password" placeholder="Ingresa tu contraseña"
                    data-i18n-placeholder="passwordPlaceholder" required>
            </div>
            <button type="submit"><i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i><span
                    data-i18n="login">Ingresar</span></button>
        </form>

        <!-- Formulario de Registro -->
        <form id="registerForm">
            <div style="text-align: center; margin-bottom: 20px;">
                <i class="fas fa-cloud-upload-alt theme-icon-big"></i>
            </div>
            <h2><i class="fas fa-user-plus" style="margin-right: 10px;"></i><span
                    data-i18n="registerTitle">Registrarse</span></h2>
            <div class="form-group">
                <label for="regUsername"><i class="fas fa-user" style="margin-right: 5px;"></i><span
                        data-i18n="username">Usuario:</span></label>
                <input type="text" id="regUsername" placeholder="Elige un nombre de usuario"
                    data-i18n-placeholder="regUsernamePlaceholder" required>
                <small data-i18n="usernameHint">Mínimo 3 caracteres</small>
            </div>
            <div class="form-group">
                <label for="regPassword"><i class="fas fa-key" style="margin-right: 5px;"></i><span
                        data-i18n="password">Contraseña:</span></label>
                <input type="password" id="regPassword" placeholder="Crea una contraseña"
                    data-i18n-placeholder="regPasswordPlaceholder" required>
                <small data-i18n="passwordHint">Mínimo 6 caracteres</small>
                <div id="passwordStrength" class="password-strength" style="display: none;">
                    <div class="password-strength-bar"></div>
                    <small id="strengthLabel"></small>
                </div>
            </div>
            <div class="form-group">
                <label for="regConfirmPassword"><i class="fas fa-key" style="margin-right: 5px;"></i><span
                        data-i18n="confirmPassword">Confirmar Contraseña:</span></label>
                <input type="password" id="regConfirmPassword" placeholder="Repite la contraseña"
                    data-i18n-placeholder="regConfirmPlaceholder" required>
            </div>
            <button type="submit"><i class="fas fa-user-plus" style="margin-right: 8px;"></i><span
                    data-i18n="register">Registrarse</span></button>
            <div id="registerMessage"></div>
        </form>

        <div id="loginMessage"></div>
    </div>

    <!-- Script inicial para aplicar tema antes de renderizar -->
    <script>
        (function () {
            const savedTheme = localStorage.getItem('userTheme');
            const savedLanguage = localStorage.getItem('language');

            if (savedLanguage) {
                document.documentElement.lang = savedLanguage;
                document.getElementById('htmlTag').lang = savedLanguage;
            }

            if (savedTheme) {
                const theme = JSON.parse(savedTheme);
                Object.entries(theme).forEach(([key, value]) => {
                    document.documentElement.style.setProperty(`--${key}`, value);
                });
            }

            // Si ya hay sesión, redirigir a apps.html
            const userStr = localStorage.getItem('user');
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    if (user && user.token && Date.now() <= user.expires) {
                        window.location.href = 'apps.html';
                    }
                } catch (e) {
                    // Continuar con login normalmente
                }
            }
        })();
    </script>

    <script src="login.js"></script>
</body>

</html>
