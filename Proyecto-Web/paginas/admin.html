<!DOCTYPE html>
<html lang="es" id="htmlTag">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="adminTitle">Panel de Administración</title>
    <link rel="stylesheet" href="gestorarchivos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="icon" href=".\Favicon\favicon.png" sizes="64x64" type="image/png">
</head>

<body>
    <!--
        ADMIN.HTML - Panel de Administración
        - Lista usuarios y permite navegar sus archivos (vista administrador)
        - Permite cambiar contraseñas y eliminar usuarios (según permisos)
        - Comparte el sistema de temas/idioma con la app principal
    -->
    <!-- ============================================================
         BARRA DE NAVEGACIÓN Y CONTROLES
         ============================================================ -->
    <div class="controls-bar">
        <button class="control-btn" id="backToAppBtn" onclick="history.back()" title="Volver a la aplicación"
            data-i18n-title="backToApp">
            <i class="fas fa-arrow-left"></i>
            <span data-i18n="backToApp">Volver</span>
        </button>
        <div class="dropdown-menu" id="settingsDropdown">
            <button class="control-btn dropdown-toggle" id="settingsBtn" title="Configuración"
                data-i18n-title="settings">
                <i class="fas fa-cog"></i>
            </button>
            <div class="dropdown-content" id="dropdownContent">
                <div class="dropdown-section">
                    <span class="dropdown-label" data-i18n="appearance">Apariencia</span>
                    <button class="dropdown-item" id="themeEditorBtn">
                        <i class="fas fa-palette"></i>
                        <span data-i18n="themeEditor">Temas</span>
                    </button>
                </div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-section">
                    <span class="dropdown-label" data-i18n="language">Idioma</span>
                    <button class="dropdown-item" id="languageToggle">
                        <i class="fas fa-language"></i>
                        <span>Español / English</span>
                    </button>
                </div>
                <div class="dropdown-divider mobile-only"></div>
                <div class="dropdown-section mobile-only">
                    <button class="dropdown-item" id="backToAppBtnMobile">
                        <i class="fas fa-arrow-left"></i>
                        <span data-i18n="backToApp">Volver</span>
                    </button>
                    <button class="dropdown-item logout-item" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        <span data-i18n="logout">Cerrar Sesión</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================
         CONTENIDO PRINCIPAL DEL PANEL
         ============================================================ -->
    <div class="admin-container" style="display: none;">
        <div class="admin-header">
            <h1 data-i18n="adminTitle" style="width: 100%; text-align: center;"><i class="fas fa-shield-alt"></i> Panel
                de Administración</h1>
        </div>

        <div class="admin-tabs" style="display: flex; gap: 15px; margin-bottom: 40px; justify-content: center;">
            <button class="action-btn primary" onclick="switchAdminTab('usersTab')"><i class="fas fa-users"></i>
                Usuarios</button>
            <button class="action-btn" onclick="switchAdminTab('ipsTab')"
                style="background-color: var(--input-bg); color: var(--text-primary);"><i class="fas fa-ban"></i> IPs
                Baneadas</button>
            <button class="action-btn" onclick="switchAdminTab('settingsTab')"
                style="background-color: var(--input-bg); color: var(--text-primary);"><i class="fas fa-cogs"></i>
                Configuración</button>
            <button id="refreshAdminBtn" class="action-btn" onclick="refreshAdminData()" style="margin-left: auto;">
                <i class="fas fa-sync-alt"></i> Refrescar
            </button>
        </div>

        <div id="usersTab" class="admin-tab-content active">
            <div id="userList" class="users-grid"
                style="display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));"></div>

            <div id="filesPanel" class="files-panel" style="display: none;">
                <div class="back-link">
                    <button id="backToUsersBtn" class="control-btn">
                        <i class="fas fa-arrow-left"></i> <span data-i18n="backToUsers">Volver a usuarios</span>
                    </button>
                </div>
                <h2 id="currentUserTitle"></h2>
                <div class="admin-file-actions"
                    style="display:flex; justify-content:flex-end; gap:10px; margin-bottom: 15px;">
                    <button class="action-btn" onclick="refreshAdminData()"><i class="fas fa-sync-alt"></i>
                        Refrescar</button>
                </div>
                <div id="pathBar" class="breadcrumb"></div>
                <div id="fileList"></div>
            </div>
        </div>

        <div id="ipsTab" class="admin-tab-content" style="display: none;">
            <div class="tab-header"
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>IPs Baneadas</h2>
                <button class="action-btn primary" onclick="openBanIpModal()"><i class="fas fa-plus"></i> Banear
                    IP</button>
            </div>
            <div id="ipsList" class="ips-grid" style="display: grid; gap: 15px;"></div>
        </div>

        <div id="settingsTab" class="admin-tab-content" style="display: none;">
            <h2>Configuración Global</h2>
            <div class="settings-form" id="globalSettingsForm"
                style="display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: var(--shadow-md);">
                <!-- Se llena con JS -->
            </div>
            <div style="text-align: center; margin-top:20px;">
                <button class="action-btn primary" onclick="saveGlobalSettings()"><i class="fas fa-save"></i> Guardar
                    Ajustes</button>
            </div>
        </div>
    </div>

    <!-- Modales de Admin Avanzado -->
    <div id="editLimitsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeAdminModal('editLimitsModal')">&times;</span>
            <h3>Editar Límites: <span id="limitsUsername" style="color: var(--primary-color);"></span></h3>
            <input type="hidden" id="editLimitsUserId">
            <div class="form-group">
                <label>Cuota de Almacenamiento (en blanco = global):</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="userQuota" placeholder="Ej: 5" style="flex: 1;">
                    <select id="userQuotaUnit" style="width: 110px; flex: none;">
                        <option value="KB">KB</option>
                        <option value="MB" selected>MB</option>
                        <option value="GB">GB</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Tamaño Max Archivo (en blanco = global):</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="userMaxFileSize" placeholder="Ej: 100" style="flex: 1;">
                    <select id="userMaxFileSizeUnit" style="width: 110px; flex: none;">
                        <option value="KB">KB</option>
                        <option value="MB" selected>MB</option>
                        <option value="GB">GB</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Ancho de Banda (0 = ilimitado, en blanco = global):</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" step="0.1" id="userBandwidth" placeholder="Ej: 1.5" style="flex: 1;">
                    <select id="userBandwidthUnit" style="width: 130px; flex: none;">
                        <option value="KB/s">KB/s</option>
                        <option value="MB/s" selected>MB/s</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Permisos granulares:</label>
                <div
                    style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 8px; margin-top: 8px;">
                    <label><input type="checkbox" class="perm-checkbox" data-bit="admin"> Administrador (ver archivos de
                        otros)</label>
                    <label><input type="checkbox" class="perm-checkbox" data-bit="superadmin"> Superadministrador
                        (acceso al panel)</label>
                    <label><input type="checkbox" class="perm-checkbox" data-bit="0x20"> Gestionar estados
                        (activar/banear)</label>
                    <label><input type="checkbox" class="perm-checkbox" data-bit="0x40"> Modificar límites y
                        cuotas</label>
                    <label><input type="checkbox" class="perm-checkbox" data-bit="0x80"> Kickear usuarios</label>
                    <label><input type="checkbox" class="perm-checkbox" data-bit="0x100"> Cambiar contraseña de
                        otros</label>
                    <label><input type="checkbox" class="perm-checkbox" data-bit="0x200"> Eliminar usuarios</label>
                    <label><input type="checkbox" class="perm-checkbox" data-bit="0x400"> Gestionar IPs baneadas</label>
                    <label><input type="checkbox" class="perm-checkbox" data-bit="0x800"> Configuración global</label>
                </div>
                <small style="color: var(--text-muted);">Nota: Los bits base (LOGIN y gestor de archivos) son
                    implícitos.</small>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeAdminModal('editLimitsModal')">Cancelar</button>
                <button class="modal-btn save" onclick="saveUserLimits()">Guardar Límites</button>
            </div>
        </div>
    </div>

    <div id="changeStatusModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeAdminModal('changeStatusModal')">&times;</span>
            <h3>Estado: <span id="statusUsername" style="color: var(--primary-color);"></span></h3>
            <input type="hidden" id="statusUserId">
            <div class="form-group">
                <label>Nuevo Estado:</label>
                <select id="userStatus" onchange="toggleBanReason()">
                    <option value="active">Activo</option>
                    <option value="disabled">Desactivado</option>
                    <option value="banned">Baneado</option>
                </select>
            </div>
            <div class="form-group" id="banReasonGroup" style="display:none;">
                <label>Motivo del Baneo:</label>
                <input type="text" id="banReason" placeholder="Especificar motivo...">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeAdminModal('changeStatusModal')">Cancelar</button>
                <button class="modal-btn save" onclick="saveUserStatus()">Guardar Estado</button>
            </div>
        </div>
    </div>

    <div id="banIpModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeAdminModal('banIpModal')">&times;</span>
            <h3><i class="fas fa-ban"></i> Banear Nueva IP</h3>
            <div class="form-group">
                <label>Dirección IP:</label>
                <input type="text" id="banIpAddress" placeholder="Ej: 192.168.1.100">
            </div>
            <div class="form-group">
                <label>Motivo:</label>
                <input type="text" id="banIpReason" placeholder="Razón del bloqueo...">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeAdminModal('banIpModal')">Cancelar</button>
                <button class="modal-btn save" onclick="submitIpBan()" style="background: var(--danger-color);">Bloquear
                    IP</button>
            </div>
        </div>
    </div>

    <!-- Modal para cambiar contraseña -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeAdminModal('passwordModal')">&times;</span>
            <h3 data-i18n="changePassword">Cambiar contraseña</h3>
            <div class="form-group">
                <label for="newPassword" data-i18n="newPassword">Nueva contraseña:</label>
                <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres"
                    data-i18n-placeholder="passwordPlaceholder">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="cancelPassword" data-i18n="cancel">Cancelar</button>
                <button class="modal-btn save" id="savePassword" data-i18n="save">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal Editor de Temas -->
    <div id="themeEditorModal" class="modal">
        <div class="modal-content theme-editor-modal">
            <span class="close-modal" onclick="closeThemeEditor()">&times;</span>
            <h3><i class="fas fa-palette"></i> <span data-i18n="themeEditor">Editor de Temas</span></h3>
            <div class="theme-preview-container">
                <div class="theme-preview" id="themePreview">
                    <div class="preview-header" data-i18n="preview">Vista</div>
                    <div class="preview-body">
                        <div class="preview-btn" data-i18n="save">Guardar</div>
                        <div class="preview-input" data-i18n="newNamePlaceholder">Nombre...</div>
                        <div class="preview-card" data-i18n="themeEditor">Temas</div>
                    </div>
                </div>
            </div>
            <div class="theme-colors-grid">
                <div class="color-picker-group">
                    <label data-i18n="primaryColor">Color Primario:</label>
                    <input type="color" id="primaryColorPicker" value="#4361ee">
                </div>
                <div class="color-picker-group">
                    <label data-i18n="secondaryColor">Color Secundario:</label>
                    <input type="color" id="secondaryColorPicker" value="#4cc9f0">
                </div>
                <div class="color-picker-group">
                    <label data-i18n="backgroundColor">Fondo:</label>
                    <input type="color" id="backgroundColorPicker" value="#f8fafc">
                </div>
                <div class="color-picker-group">
                    <label data-i18n="textColor">Texto:</label>
                    <input type="color" id="textColorPicker" value="#1e293b">
                </div>
                <div class="color-picker-group">
                    <label data-i18n="accentColor">Acento:</label>
                    <input type="color" id="accentColorPicker" value="#7209b7">
                </div>
                <div class="color-picker-group">
                    <label data-i18n="successColor">Éxito:</label>
                    <input type="color" id="successColorPicker" value="#06d6a0">
                </div>
                <div class="color-picker-group">
                    <label data-i18n="dangerColor">Error:</label>
                    <input type="color" id="dangerColorPicker" value="#ef476f">
                </div>
                <div class="color-picker-group">
                    <label data-i18n="warningColor">Advertencia:</label>
                    <input type="color" id="warningColorPicker" value="#ffd166">
                </div>
            </div>
            <div class="theme-presets">
                <h4 data-i18n="themePresets">Temas Predefinidos:</h4>
                <div class="preset-buttons">
                    <button class="preset-btn" onclick="applyPreset('default')"
                        style="background: linear-gradient(135deg, #4361ee, #7209b7);">Default</button>
                    <button class="preset-btn" onclick="applyPreset('ocean')"
                        style="background: linear-gradient(135deg, #0077b6, #00b4d8);">Ocean</button>
                    <button class="preset-btn" onclick="applyPreset('forest')"
                        style="background: linear-gradient(135deg, #2d6a4f, #40916c);">Forest</button>
                    <button class="preset-btn" onclick="applyPreset('sunset')"
                        style="background: linear-gradient(135deg, #ff6b35, #f7c59f);">Sunset</button>
                    <button class="preset-btn" onclick="applyPreset('midnight')"
                        style="background: linear-gradient(135deg, #1a1a2e, #16213e);">Midnight</button>
                    <button class="preset-btn" onclick="applyPreset('dark')"
                        style="background: linear-gradient(135deg, #0f172a, #3f37c9);">Dark</button>
                    <button class="preset-btn" onclick="applyPreset('candy')"
                        style="background: linear-gradient(135deg, #ff9a9e, #fecfef);">Candy</button>
                </div>
            </div>
            <div class="theme-actions">
                <button class="modal-btn cancel" onclick="resetTheme()" data-i18n="resetTheme">Restablecer</button>
                <button class="modal-btn save" onclick="saveTheme()" data-i18n="saveTheme">Guardar Tema</button>
            </div>
        </div>
    </div>

    <!-- Script de control de sesión inicial para evitar parpadeo -->
    <script>
        (function () {
            const userStr = localStorage.getItem('user');
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    if (user && user.expires && Date.now() < user.expires) {
                        document.querySelector('.admin-container').style.display = 'block';
                        return;
                    }
                } catch (e) { }
            }
            window.location.href = 'login.html';
        })();
    </script>

    <script src="admin.js"></script>
</body>

</html>
