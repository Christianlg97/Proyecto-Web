<!DOCTYPE html>
<html lang="es" id="htmlTag">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selección de Aplicación - Sistema de Gestión</title>
    <link rel="stylesheet" href="gestorarchivos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .app-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .app-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .app-card i {
            font-size: 56px;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .app-card h3 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
        }

        .app-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin: 0;
            line-height: 1.5;
        }

        #adminCard {
            display: none;
            /* Oculto por defecto, se muestra si es admin */
        }

        .logout-btn-apps {
            margin-top: 40px;
            background: transparent;
            border: 2px solid var(--danger);
            color: var(--danger);
            width: auto;
            display: inline-block;
            padding: 10px 25px;
            font-size: 14px;
        }

        .logout-btn-apps:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 5px 15px rgba(239, 71, 111, 0.3);
        }

        .selection-title {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: var(--text-primary);
        }
    </style>
</head>

<body>
    <div class="container" id="appsContainer" style="text-align: center; max-width: 900px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <i class="fas fa-th-large theme-icon-big"></i>
        </div>
        <h2 class="selection-title">Selecciona una Aplicación</h2>
        <div id="userInfo" style="margin-bottom: 20px; display: inline-block; width: auto; padding: 10px 20px;">
            <i class="fas fa-user-circle"></i> Bienvenido, <strong id="userNameDisplay">Usuario</strong>
        </div>

        <div class="app-grid">
            <div class="app-card" id="fileManagerCard">
                <i class="fas fa-folder-open"></i>
                <h3>Gestor de Archivos</h3>
                <p>Sube, comparte y administra tus archivos en la nube de forma segura y rápida.</p>
            </div>

            <div class="app-card" id="adminCard">
                <i class="fas fa-shield-alt"></i>
                <h3>Panel de Administración</h3>
                <p>Gestiona usuarios, permisos y monitoriza el almacenamiento del sistema.</p>
            </div>
        </div>

        <button class="logout-btn-apps" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </button>
    </div>

    <!-- Script inicial para aplicar tema antes de renderizar -->
    <script>
        (function () {
            const themePresets = {
                default: { primary: '#4361ee', secondary: '#4cc9f0', background: '#f8fafc', text: '#0f172a', accent: '#7209b7', success: '#06d6a0', danger: '#ef476f', warning: '#f59e0b' }
            };

            function isColorDark(hex) {
                const color = hex.replace('#', '');
                const r = parseInt(color.substr(0, 2), 16), g = parseInt(color.substr(2, 2), 16), b = parseInt(color.substr(4, 2), 16);
                return ((r * 299) + (g * 587) + (b * 114)) / 1000 < 128;
            }

            function adjustColor(hex, amount) {
                const num = parseInt(hex.replace('#', ''), 16);
                const r = Math.min(255, Math.max(0, (num >> 16) + amount));
                const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
                const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
                return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).padStart(6, '0');
            }

            function applyTheme(theme) {
                const root = document.documentElement;
                root.style.setProperty('--primary', theme.primary);
                root.style.setProperty('--primary-light', adjustColor(theme.primary, 40));
                root.style.setProperty('--primary-dark', adjustColor(theme.primary, -20));
                root.style.setProperty('--secondary', theme.secondary);
                root.style.setProperty('--accent', theme.accent);
                root.style.setProperty('--success', theme.success);
                root.style.setProperty('--danger', theme.danger);
                root.style.setProperty('--warning', theme.warning);
                root.style.setProperty('--info', adjustColor(theme.primary, 20));

                const isDarkBg = isColorDark(theme.background);
                root.style.setProperty('--bg-main', theme.background);
                root.style.setProperty('--bg-gradient-start', theme.background);
                root.style.setProperty('--bg-gradient-end', isDarkBg ? theme.accent : adjustColor(theme.primary, 160));

                root.style.setProperty('--text-primary', theme.text);
                root.style.setProperty('--text-secondary', isDarkBg ? adjustColor(theme.text, -60) : adjustColor(theme.text, 40));
                root.style.setProperty('--text-muted', isDarkBg ? adjustColor(theme.text, -110) : adjustColor(theme.text, 80));

                root.style.setProperty('--container-bg', isDarkBg ? 'rgba(15, 23, 42, 0.92)' : 'rgba(248, 250, 252, 0.96)');
                root.style.setProperty('--card-bg', isDarkBg ? '#111827' : '#ffffff');
                root.style.setProperty('--input-bg', isDarkBg ? '#0b1220' : '#ffffff');
                root.style.setProperty('--filter-bg', isDarkBg ? '#0b1220' : '#f1f5f9');
                root.style.setProperty('--border-color', isDarkBg ? '#334155' : '#e2e8f0');
                root.style.setProperty('--input-border', isDarkBg ? '#475569' : '#cbd5e1');
                root.style.setProperty('--table-row-hover', isDarkBg ? '#1f2937' : '#f8fafc');
            }

            const savedTheme = localStorage.getItem('userTheme');
            if (savedTheme) {
                applyTheme(JSON.parse(savedTheme));
            } else {
                applyTheme(themePresets.default);
            }
        })();
    </script>
    <script src="apps.js"></script>
</body>

</html>
