# CONFIGURACIÓN DE NGINX
# Actúa como servidor web para archivos estáticos y proxy inverso para la API de Node.js.

events {
    worker_connections 1024; # Número máximo de conexiones simultáneas por trabajador
}

http {
    include /etc/nginx/mime.types; # Tipos de archivos reconocidos (CSS, JS, etc.)
    default_type application/octet-stream;

    # Configuración de logs para monitorizar el tráfico y errores
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Compresión Gzip para acelerar la carga de archivos de texto (CSS, JS, JSON)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

    server {
        listen 80; # Escucha en el puerto 80 (HTTP estándar)
        server_name localhost;
        root /usr/share/nginx/html; # Directorio donde están las páginas HTML/JS/CSS
        index index.html;

        # Cabeceras de seguridad básicas
        add_header X-Frame-Options "SAMEORIGIN" always; # Previene Clickjacking
        add_header X-Content-Type-Options "nosniff" always; # Evita que el navegador adivine el tipo MIME
        add_header X-XSS-Protection "1; mode=block" always; # Protección básica contra XSS

        # Redirección inicial: Al entrar en la raíz, lleva a la página de login
        location = / {
            return 302 /login.html;
        }

        # Servir archivos estáticos del frontend (página login y demás)
        location / {
            try_files $uri $uri/ =404;
            expires 1h; # Cache de 1 hora para archivos estáticos
            add_header Cache-Control "public, no-transform";
        }

        # PROXY INVERSO: Redirige las peticiones /api/ al backend de Node.js
        location /api/ {
            proxy_pass http://nodejs:3000/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CONFIGURACIÓN PARA SUBIDA DE ARCHIVOS GRANDES
            client_max_body_size 50000M; # Límite máximo de subida (50GB)
            client_body_buffer_size 128k;
            proxy_request_buffering off; # Envía los datos al backend según llegan
            proxy_buffering off;

            # Timeouts extendidos para procesar archivos muy pesados sin cortar la conexión
            proxy_connect_timeout 3000s;
            proxy_send_timeout 3000s;
            proxy_read_timeout 3000s;
        }

        # Acceso directo a archivos previsualizables
        location /uploads/ {
            proxy_pass http://nodejs:3000/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Cache agresivo para archivos subidos (30 días)
            expires 30d;
            add_header Cache-Control "public, immutable, no-transform";
        }

        # Páginas de error personalizadas
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
